<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Athisttaprabu Ramalingam</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .coming-soon-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            background: radial-gradient(circle at top right, #e9ecef 0%, var(--bg-dark) 50%);
        }

        .coming-soon-content h1 {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .coming-soon-content p {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .back-btn:hover {
            background-color: #444;
        }
    </style>
</head>

<body>
    <div class="coming-soon-container">
        <div class="coming-soon-content">
            <i class="fas fa-tools" style="font-size: 5rem; color: var(--accent); margin-bottom: 30px;"></i>
            <h1>Coming Soon</h1>
            <p>This article is currently being written. Stay tuned!</p>
            <a href="index.html" class="back-btn">Back to Portfolio</a>
        </div>
    </div>
</body>

</html>
